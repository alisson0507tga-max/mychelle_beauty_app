name: Criar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Código de desconto
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            unzip \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-dev \
            libssl-dev \
            libffi-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libjpeg-dev \
            zlib1g-dev \
            liblzma-dev \
            libgdbm-dev \
            libnss3-dev \
            libsqlite3-dev \
            libreadline-dev \
            libbz2-dev \
            pkg-config \
            autoconf \
            automake \
            libtool \
            build-essential

      - name: Instalar Cython e Buildozer
        run: |
          pip3 install --user --upgrade Cython pip
          pip3 install --user buildozer

      - name: Compilar APK com Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk 

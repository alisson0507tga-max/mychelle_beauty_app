name: Build Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          unzip \
          python3 \
          python3-pip \
          python3-setuptools \
          python3-dev \
          libssl-dev \
          libffi-dev \
          libncursesw5-dev \
          libjpeg-dev \
          zlib1g-dev \
          liblzma-dev \
          libgdbm-dev \
          libnss3-dev \
          libsqlite3-dev \
          libreadline-dev \
          libbz2-dev \
          pkg-config \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          libltdl-dev \
          build-essential \
          openjdk-17-jdk
    
    - name: Clear build cache
      run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer
    
    - name: Install Buildozer
      run: |
        pip3 install --user --upgrade Cython pip
        pip3 install --user buildozer
    
    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin/
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        yes | buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
 

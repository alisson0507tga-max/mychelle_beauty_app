name: Build APK Bianca Beauty

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk unzip zip libssl-dev zlib1g-dev \
          automake autoconf libtool pkg-config python3-dev
        python3 -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Limpar cache do Buildozer
      run: rm -rf .buildozer

    - name: Compilar APK com Buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: BiancaBeauty-APK
        path: bin/*.apk
